<svg width="520" height="80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes glow {
        0%,100% { filter: drop-shadow(0 0 4px #FFDD00) drop-shadow(0 0 8px #FFAA00); opacity: 1; }
        50%      { filter: drop-shadow(0 0 12px #FFDD00) drop-shadow(0 0 24px #FF8800); opacity: 0.85; }
      }
      @keyframes steam1 {
        0%   { transform: translateY(0) scaleX(1);   opacity: 0.9; }
        100% { transform: translateY(-14px) scaleX(1.4); opacity: 0; }
      }
      @keyframes steam2 {
        0%   { transform: translateY(0) scaleX(1);   opacity: 0.7; }
        100% { transform: translateY(-14px) scaleX(1.4); opacity: 0; }
      }
      @keyframes pulse-text {
        0%,100% { opacity: 1; }
        50%      { opacity: 0.75; }
      }
      @keyframes shimmer {
        0%   { stop-color: #FFDD00; }
        50%  { stop-color: #FFB300; }
        100% { stop-color: #FFDD00; }
      }
      .card   { animation: glow 2.4s ease-in-out infinite; }
      .steam1 { animation: steam1 1.8s ease-out infinite; }
      .steam2 { animation: steam2 1.8s ease-out infinite 0.6s; }
      .steam3 { animation: steam2 1.8s ease-out infinite 1.2s; }
      .cta    { animation: pulse-text 2.4s ease-in-out infinite; }
      .label  { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#FFDD00"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#1a1600"/>
      <stop offset="100%" stop-color="#1f1a00"/>
    </linearGradient>
  </defs>

  <!-- Card background -->
  <rect width="520" height="80" rx="10" fill="url(#bgGrad)"/>
  <rect width="520" height="80" rx="10" fill="none" stroke="#FFDD00" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Left text block -->
  <text x="22" y="30" class="label cta" font-size="13" font-weight="700" fill="#FFDD00">This system saved you time.</text>
  <text x="22" y="50" class="label" font-size="11.5" fill="#c9a800">If it closed a gap — buy me a coffee.</text>
  <text x="22" y="66" class="label" font-size="10" fill="#7a6500">No account needed · One click</text>

  <!-- Coffee cup icon area -->
  <g transform="translate(290, 15)">
    <!-- Steam wisps -->
    <path class="steam1" d="M10 8 Q12 4 10 0" stroke="#FFDD00" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-opacity="0.8"/>
    <path class="steam2" d="M17 8 Q19 4 17 0" stroke="#FFB300" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-opacity="0.8"/>
    <path class="steam3" d="M24 8 Q26 4 24 0" stroke="#FFDD00" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-opacity="0.8"/>
    <!-- Cup body -->
    <path d="M4 14 L6 42 Q17 46 28 42 L30 14 Z" fill="#FFDD00" opacity="0.9"/>
    <path d="M4 14 L30 14" stroke="#cc9900" stroke-width="1" fill="none"/>
    <!-- Cup handle -->
    <path d="M30 20 Q40 20 40 28 Q40 36 30 36" stroke="#FFDD00" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Saucer -->
    <ellipse cx="17" cy="44" rx="16" ry="3.5" fill="#FFB300" opacity="0.7"/>
  </g>

  <!-- CTA Button -->
  <g class="card" transform="translate(348, 16)">
    <rect width="152" height="48" rx="8" fill="url(#btnGrad)"/>
    <text x="76" y="22" text-anchor="middle" class="label" font-size="12" font-weight="800" fill="#1a0f00">☕ BUY ME A COFFEE</text>
    <text x="76" y="38" text-anchor="middle" class="label" font-size="10" font-weight="600" fill="#3d2800">buymeacoffee.com/GadaaLabs</text>
  </g>
</svg>

<svg width="800" height="80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; }
      .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; font-weight: 800; letter-spacing: 1px; }
      @keyframes pulse1 { 0%,100%{opacity:1;filter:brightness(1)} 50%{opacity:0.75;filter:brightness(1.3)} }
      @keyframes pulse2 { 0%,100%{opacity:0.75;filter:brightness(1)} 50%{opacity:1;filter:brightness(1.3)} }
      @keyframes pulse3 { 0%,100%{opacity:1;filter:brightness(1)} 25%{opacity:0.75;filter:brightness(1.3)} 75%{opacity:0.75;filter:brightness(1.3)} }
      @keyframes pulse4 { 0%,100%{opacity:0.75;filter:brightness(1)} 25%{opacity:1;filter:brightness(1.3)} 75%{opacity:1;filter:brightness(1.3)} }
      @keyframes slidein { from{transform:translateX(-8px);opacity:0} to{transform:translateX(0);opacity:1} }
      .p1 { animation: pulse1 3s ease-in-out infinite; }
      .p2 { animation: pulse2 3s ease-in-out infinite 0.75s; }
      .p3 { animation: pulse3 3s ease-in-out infinite 1.5s; }
      .p4 { animation: pulse4 3s ease-in-out infinite 2.25s; }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="glow1"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="80" rx="10" fill="url(#bg)"/>
  <rect width="800" height="80" rx="10" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Header label -->
  <text x="400" y="18" text-anchor="middle" class="title" fill="#8b949e">⚡ KARPATHY GUIDELINES — ALWAYS-ON BEHAVIORAL LAYER</text>
  <line x1="30" y1="25" x2="770" y2="25" stroke="#30363d" stroke-width="0.5"/>

  <!-- Principle 1: Think Before Coding -->
  <g class="p1" transform="translate(20, 33)">
    <rect width="178" height="36" rx="6" fill="#1c3a5e"/>
    <rect width="178" height="36" rx="6" fill="none" stroke="#4A90D9" stroke-width="1.5"/>
    <text x="89" y="13" text-anchor="middle" class="label" fill="#4A90D9">① THINK BEFORE CODING</text>
    <text x="89" y="27" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#7eb8f5">Surface assumptions first</text>
  </g>

  <!-- Principle 2: Simplicity First -->
  <g class="p2" transform="translate(210, 33)">
    <rect width="178" height="36" rx="6" fill="#1a3d2b"/>
    <rect width="178" height="36" rx="6" fill="none" stroke="#27AE60" stroke-width="1.5"/>
    <text x="89" y="13" text-anchor="middle" class="label" fill="#27AE60">② SIMPLICITY FIRST</text>
    <text x="89" y="27" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#6ddb96">Minimum code. Nothing speculative.</text>
  </g>

  <!-- Principle 3: Surgical Changes -->
  <g class="p3" transform="translate(400, 33)">
    <rect width="178" height="36" rx="6" fill="#3d2b14"/>
    <rect width="178" height="36" rx="6" fill="none" stroke="#E67E22" stroke-width="1.5"/>
    <text x="89" y="13" text-anchor="middle" class="label" fill="#E67E22">③ SURGICAL CHANGES</text>
    <text x="89" y="27" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#f0a55a">Touch only what you must.</text>
  </g>

  <!-- Principle 4: Goal-Driven Execution -->
  <g class="p4" transform="translate(590, 33)">
    <rect width="190" height="36" rx="6" fill="#2d1f40"/>
    <rect width="190" height="36" rx="6" fill="none" stroke="#9B59B6" stroke-width="1.5"/>
    <text x="95" y="13" text-anchor="middle" class="label" fill="#9B59B6">④ GOAL-DRIVEN EXECUTION</text>
    <text x="95" y="27" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#c08de0">Verifiable criteria. Loop until done.</text>
  </g>
</svg>
